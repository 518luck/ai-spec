name: ai-spec

services:
  postgres:
    image: postgres:17-alpine
    container_name: ai-spec-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: duoyun
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_spec
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duoyun -d ai_spec"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.2-alpine
    container_name: ai-spec-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
